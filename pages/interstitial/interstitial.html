<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holdup — Nudge</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-900 flex items-center justify-center">
    <div class="text-center p-8">
      <h1 class="text-4xl font-bold text-white mb-4">Hold up!</h1>
      <p id="nudgeMessage" class="text-xl text-gray-300 mb-8">Are you sure about this?</p>
      <div class="space-x-4">
        <button
          id="proceedBtn"
          class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-lg"
        >
          I know what I'm doing
        </button>
        <button
          id="goBackBtn"
          class="px-6 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors text-lg"
        >
          Take me back
        </button>
      </div>
    </div>
    <script src="interstitial.js"></script>
  </body>
</html>
