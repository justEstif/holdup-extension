<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holdup — Nudge</title>
    <link rel="stylesheet" href="../../css/tailwind.css" />
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 bg-slate-100 dark:bg-slate-900">
    <div class="max-w-lg w-full bg-white dark:bg-slate-800 rounded-2xl overflow-hidden shadow-2xl">
      <div class="h-1 bg-amber-500"></div>
      <div class="p-12 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-slate-800 dark:text-white mt-10">
          Hold up.
        </h1>
        <p
          id="nudgeMessage"
          class="text-xl text-slate-600 dark:text-slate-300 leading-relaxed mt-4"
        >
          Loading…
        </p>
        <div class="flex gap-4 mt-10">
          <button
            id="goBackBtn"
            class="flex-1 px-6 py-3 bg-amber-500 text-white font-semibold rounded-xl hover:bg-amber-600 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400"
          >
            Go back
          </button>
          <button
            id="continueBtn"
            class="flex-1 px-6 py-3 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold rounded-xl hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400"
          >
            Continue anyway
          </button>
        </div>
        <div class="mt-4">
          <button
            id="remindBtn"
            class="text-sm text-slate-500 dark:text-slate-400 hover:text-amber-500 dark:hover:text-amber-400 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400"
          >
            Remind me again in 5 minutes
          </button>
        </div>
        <div id="redirectContainer" class="hidden mt-3">
          <button
            id="redirectBtn"
            class="text-sm text-slate-500 dark:text-slate-400 hover:text-amber-500 dark:hover:text-amber-400 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400"
          >
            Go somewhere else
          </button>
        </div>
      </div>
    </div>
    <script src="../../storage.js"></script>
    <script src="../../theme.js"></script>
    <script src="interstitial.js"></script>
  </body>
</html>
