<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holdup — Settings</title>
    <link rel="stylesheet" href="css/tailwind.css" />
  </head>
  <body class="max-w-2xl mx-auto p-6 bg-slate-50 min-h-screen">
    <h1 class="text-2xl font-bold text-slate-800 mb-8">Holdup — Settings</h1>

    <form id="domainForm" class="bg-white rounded-xl border border-slate-200 p-5 mb-6">
      <h2 class="text-lg font-semibold text-slate-800 mb-4">Add Domain</h2>
      <div class="flex flex-col sm:flex-row gap-3 mb-4">
        <input
          id="hostInput"
          type="text"
          placeholder="e.g. claude.ai"
          required
          class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
        />
        <input
          id="messageInput"
          type="text"
          placeholder="Nudge message"
          required
          class="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
        />
        <select
          id="modeInput"
          class="bg-white px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
        >
          <option value="overlay">Overlay</option>
          <option value="redirect">Fullscreen</option>
        </select>
      </div>
      <button
        type="button"
        id="advancedToggle"
        class="text-sm text-slate-500 hover:text-amber-600 cursor-pointer"
      >
        ▸ Advanced
      </button>
      <div id="advancedSection" class="hidden mt-4 space-y-3">
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Cooldown</label>
          <select
            id="cooldownTypeInput"
            class="mt-1 w-full bg-white px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
          >
            <option value="session">Until browser restart</option>
            <option value="time">For specified minutes</option>
            <option value="always">Always ask</option>
          </select>
        </div>
        <div id="cooldownMinutesGroup" class="hidden">
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide"
            >Cooldown minutes</label
          >
          <input
            id="cooldownMinutesInput"
            type="number"
            min="1"
            value="30"
            class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
          />
        </div>
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide"
            >Redirect URL</label
          >
          <input
            id="redirectUrlInput"
            type="url"
            placeholder="https://example.com"
            class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
          />
        </div>
      </div>
      <div class="mt-4">
        <button
          type="submit"
          class="px-4 py-2 bg-amber-500 text-white text-sm font-semibold rounded-lg hover:bg-amber-600 transition-colors"
        >
          Add Domain
        </button>
      </div>
    </form>

    <div id="domainList" class="space-y-3"></div>
    <p id="emptyState" class="hidden text-sm text-slate-400 text-center py-8">
      No domains configured yet.
    </p>

    <script src="storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
