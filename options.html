<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holdup — Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="max-w-2xl mx-auto p-6 bg-gray-50 min-h-screen">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Holdup Settings</h1>

    <form id="domainForm" class="mb-6">
      <div class="flex gap-2 mb-4">
        <input
          id="hostInput"
          type="text"
          placeholder="e.g. claude.ai"
          class="flex-1 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <input
          id="messageInput"
          type="text"
          placeholder="Nudge message"
          class="flex-1 px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <select
          id="modeInput"
          class="px-3 py-2 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="overlay">Overlay</option>
          <option value="redirect">Redirect</option>
        </select>
      </div>
      <button
        type="submit"
        class="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors"
      >
        Add Domain
      </button>
    </form>

    <div id="domainList" class="space-y-2"></div>

    <script src="options.js"></script>
  </body>
</html>
